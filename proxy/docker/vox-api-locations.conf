location /api/v1/auth/ {
    proxy_pass http://vox-auth-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
}

location = /api/v1/message/ws {
    proxy_pass http://vox-message-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location = /api/v1/realtime/ws {
    proxy_pass http://vox-realtime-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /api/v1/message/ {
    proxy_pass http://vox-message-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
}

location /api/v1/profile/ {
    proxy_pass http://vox-profile-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
}

location /api/v1/attachments/ {
    proxy_pass http://vox-attachments-app:8080;
    proxy_http_version 1.1;
    include /etc/nginx/includes/vox-proxy-headers.conf;
}
